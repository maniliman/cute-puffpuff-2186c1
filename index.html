<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>99 Names Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { slate: { 950: '#020617' } } } }
        }
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; overflow: hidden; height: 100dvh; width: 100vw; }
        .tap-target { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; }
        .tap-target:active { transform: scale(0.95); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .no-select { user-select: none; -webkit-user-select: none; }
        
        .view-content { display: none; height: 100%; width: 100%; flex-direction: column; overflow-y: auto; }
        .view-content.active { display: flex; }

        .tag-container { transition: max-height 0.3s ease-in-out; }
        .tag-collapsed { max-height: 120px; overflow: hidden; position: relative; }
        .tag-collapsed::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(to bottom, transparent, #0f172a); pointer-events: none; }

        /* Breathing Pacer Styles */
        @keyframes breathingPulse {
            0% { box-shadow: 0 0 0px 0px rgba(52, 211, 153, 0); transform: scale(1); }
            40% { box-shadow: 0 0 50px 15px rgba(52, 211, 153, 0.4); transform: scale(1.08); }
            60% { box-shadow: 0 0 50px 15px rgba(52, 211, 153, 0.4); transform: scale(1.08); }
            100% { box-shadow: 0 0 0px 0px rgba(52, 211, 153, 0); transform: scale(1); }
        }
        .breathing-active #current-count-container { animation: breathingPulse 12s ease-in-out infinite; border-radius: 50%; }
        
        #breathing-line { height: 6px; background: #34d399; width: 0%; transition: width 0s linear; box-shadow: 0 0 15px #34d399; }

        #global-back-btn { transition: opacity 0.2s, transform 0.2s; }
        #global-back-btn.hidden { opacity: 0; pointer-events: none; transform: translateX(-10px); }
    </style>
</head>
<body class="font-sans antialiased flex justify-center no-select">

    <div class="w-full max-w-md bg-slate-900 h-full shadow-2xl relative flex flex-col overflow-hidden border-x border-slate-800/50">
        
        <header id="main-header" class="bg-slate-900 border-b border-slate-800/80 p-6 z-10 shrink-0">
            <h1 class="text-2xl font-bold tracking-wide text-white font-serif">Asmaul Husna</h1>
            <p id="header-subtitle" class="text-emerald-400 text-sm mt-1 uppercase tracking-tighter font-bold">Daily Companion</p>
        </header>

        <!-- === VIEW: HOME === -->
        <main id="view-home" class="view-content active p-6 pb-32 fade-in">
            <div class="mb-8">
                <h2 class="text-xs font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Alignments</h2>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="startRoutine('morning')" class="bg-slate-800 border border-slate-700/50 p-4 rounded-3xl flex flex-col items-start gap-2 active:scale-95 transition-all">
                        <span class="text-2xl">🌅</span>
                        <h3 class="font-bold text-white text-sm">Morning</h3>
                        <p class="text-[10px] text-slate-500">7 Names Set</p>
                    </button>
                    <button onclick="startRoutine('evening')" class="bg-slate-800 border border-slate-700/50 p-4 rounded-3xl flex flex-col items-start gap-2 active:scale-95 transition-all">
                        <span class="text-2xl">🌌</span>
                        <h3 class="font-bold text-white text-sm">Evening</h3>
                        <p class="text-[10px] text-slate-500">7 Names Set</p>
                    </button>
                </div>
                <button onclick="startRoutine('crisis')" class="w-full mt-3 bg-emerald-900/10 border border-emerald-800/30 p-5 rounded-3xl flex items-center gap-4 active:scale-95 transition-all text-left shadow-lg">
                    <span class="text-3xl">🫁</span>
                    <div>
                        <h3 class="font-bold text-emerald-400 text-sm italic underline underline-offset-4">60-Second Reset</h3>
                        <p class="text-[10px] text-emerald-500/60 uppercase tracking-widest font-black">Emergency Peace Mode</p>
                    </div>
                </button>
            </div>

            <div class="mb-8">
                <h2 class="text-xs font-black text-slate-500 uppercase tracking-[0.2em] mb-4">30-Day Mastery</h2>
                <div onclick="startDayTrack()" class="bg-gradient-to-br from-indigo-950 to-slate-800 border border-indigo-500/20 p-6 rounded-[2rem] relative overflow-hidden cursor-pointer active:scale-95 transition-all shadow-xl">
                    <div class="flex justify-between items-center mb-4">
                        <span id="track-day-label" class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-400">Day 1 of 30</span>
                        <div class="flex gap-1.5" id="track-progress-dots"></div>
                    </div>
                    <h3 id="track-name-trans" class="text-3xl font-black text-white mb-1">Ya Rahman</h3>
                    <p id="track-name-meaning" class="text-slate-400 text-sm">The Most Merciful</p>
                    <div class="mt-6 flex justify-end">
                        <div class="bg-indigo-600 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black shadow-lg uppercase tracking-widest">Begin 100x</div>
                    </div>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-xs font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Journey Stats</h2>
                <div class="bg-slate-800 border border-slate-700/50 p-6 rounded-[2rem] shadow-inner relative overflow-hidden">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Lifetime Total</p>
                            <p id="lifetime-stats" class="text-4xl font-black text-white">0</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="toggleStatsVisibility()" class="p-3 bg-slate-900/50 rounded-2xl text-slate-400 hover:text-emerald-400 transition-all border border-slate-700/30">
                                <svg class="w-5 h-5" id="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            </button>
                            <button id="btn-reset-stats" class="p-3 bg-slate-900/50 rounded-2xl text-slate-400 hover:text-red-400 transition-all border border-slate-700/30">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="flex gap-2" id="recent-names-container"></div>
                </div>
            </div>
        </main>

        <!-- === VIEW: LIBRARY === -->
        <main id="view-library" class="view-content p-6 pb-32 fade-in">
            <div class="mb-6 relative">
                <input type="text" id="library-search" onkeyup="handleSearch(event)" placeholder="Search names..." class="w-full pl-4 pr-10 py-5 rounded-[1.5rem] border border-slate-700 bg-slate-800 focus:border-emerald-500 outline-none text-white shadow-sm transition-all">
                <svg class="w-6 h-6 text-slate-500 absolute right-5 top-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <div id="library-list" class="space-y-4"></div>
        </main>

        <!-- === VIEW: ROUTER (WEAVER) === -->
        <main id="view-router" class="view-content p-6 pb-32 fade-in">
            <div class="space-y-6 mb-8">
                <div class="bg-slate-800 p-5 rounded-[2rem] border border-slate-700/50">
                    <div class="flex justify-between items-center mb-4"><h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Feelings</h2><button onclick="toggleExpand('feelings-box', this)" class="text-[10px] text-emerald-400 font-bold uppercase">Show all</button></div>
                    <div id="feelings-box" class="flex flex-wrap gap-2 tag-container tag-collapsed"></div>
                </div>
                <div class="bg-slate-800 p-5 rounded-[2rem] border border-slate-700/50">
                    <div class="flex justify-between items-center mb-4"><h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Situations</h2><button onclick="toggleExpand('situations-box', this)" class="text-[10px] text-emerald-400 font-bold uppercase">Show all</button></div>
                    <div id="situations-box" class="flex flex-wrap gap-2 tag-container tag-collapsed"></div>
                </div>
            </div>

            <div id="combination-banner" class="hidden mb-10 space-y-4">
                <div class="bg-indigo-900 border border-indigo-500/40 p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>
                    <h3 class="text-[10px] text-indigo-300 font-black uppercase tracking-[0.3em] mb-4">Flowing Formula</h3>
                    <p id="combined-dua-text" class="text-2xl font-serif text-white leading-relaxed italic mb-6"></p>
                    <div class="pt-6 border-t border-indigo-500/20">
                        <h4 class="text-[10px] text-indigo-400/70 font-black uppercase tracking-widest mb-2">Short Version</h4>
                        <p id="short-dua-text" class="text-sm text-indigo-100 font-bold italic"></p>
                    </div>
                    <div class="flex gap-3 mt-8">
                        <button onclick="clearFilters()" class="px-5 py-3 bg-slate-900 text-[10px] font-black text-slate-500 rounded-2xl uppercase tracking-widest">Reset</button>
                        <button onclick="startWeavedDua()" class="flex-1 py-4 bg-emerald-600 text-white text-xs font-black rounded-2xl uppercase tracking-widest shadow-xl active:scale-95">Send to Counter</button>
                    </div>
                </div>
            </div>
            <div id="router-list" class="space-y-4 pb-20"></div>
        </main>

        <!-- === VIEW: JOURNAL === -->
        <main id="view-journal" class="view-content p-6 pb-32 fade-in">
            <div id="journal-entries-list" class="space-y-4"></div>
        </main>

        <!-- === VIEW: TASBIH === -->
        <main id="view-counter" onclick="handleMainTap(event)" class="view-content items-center justify-start p-6 bg-slate-900 z-20 fade-in select-none relative cursor-pointer overflow-y-auto">
            <div class="absolute top-6 left-6 right-6 flex justify-between items-center z-30">
                <button onclick="switchTab('home')" class="text-slate-500 hover:text-white p-3 bg-slate-800 rounded-2xl border border-slate-700 active:scale-90 shadow-lg transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div class="flex gap-2">
                    <button onclick="toggleBreathingMode()" id="breathing-toggle-btn" class="px-4 py-2.5 bg-slate-800 rounded-2xl text-[10px] font-black text-slate-500 border border-slate-700 uppercase tracking-widest shadow-lg transition-all">Pacer Off</button>
                    <button id="btn-reset" class="text-slate-500 hover:text-emerald-400 p-3 bg-slate-800 rounded-2xl border border-slate-700 shadow-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    </button>
                    <button onclick="toggleSound()" id="sound-btn" class="text-slate-500 hover:text-emerald-400 p-3 bg-slate-800 rounded-2xl border border-slate-700 shadow-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                    </button>
                </div>
            </div>

            <div id="breathing-line-container" class="absolute top-20 left-0 right-0 h-1.5 bg-slate-800/30 z-30 hidden"><div id="breathing-line"></div></div>

            <div class="text-center mt-20 mb-2 w-full px-4 relative z-0 flex flex-col items-center">
                <div id="routine-progress" class="hidden mb-6 px-4 py-1.5 rounded-full bg-slate-800 border border-slate-700 text-[10px] font-black text-slate-400 tracking-[0.3em] uppercase shadow-lg">STEP: <span id="routine-step" class="text-emerald-400">1/7</span></div>
                
                <h2 id="counter-arabic" class="text-6xl font-black text-white mb-3 font-serif" dir="rtl"></h2>
                <h3 id="counter-transliteration" class="text-2xl font-black text-emerald-400 uppercase tracking-wider"></h3>
                <p id="counter-meaning" class="text-slate-500 mt-2 text-sm px-4 font-medium mb-6"></p>
                
                <div class="flex gap-2 justify-center mb-6">
                    <button onclick="setDhikrTarget('self')" id="target-pill-self" class="px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-emerald-600 text-white shadow-xl transition-all">Me</button>
                    <button onclick="setDhikrTarget('family')" id="target-pill-family" class="px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-slate-800 border border-slate-700 text-slate-500 transition-all">Family</button>
                    <button onclick="setDhikrTarget('him')" id="target-pill-him" class="px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-slate-800 border border-slate-700 text-slate-500 transition-all">Him</button>
                    <button onclick="setDhikrTarget('her')" id="target-pill-her" class="px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest bg-slate-800 border border-slate-700 text-slate-500 transition-all">Her</button>
                </div>

                <div id="how-to-ask-box" class="px-8 py-6 bg-slate-800/80 rounded-[2.5rem] border border-slate-700/50 max-w-sm w-full text-center shadow-2xl relative"><p id="counter-template" class="text-lg text-white font-serif leading-relaxed italic"></p></div>
            </div>

            <div class="flex-shrink-0 z-0 pointer-events-none mt-8 mb-8 w-full max-w-xs flex flex-col items-center justify-center px-4" id="current-count-container">
                <span id="current-count" class="text-[8rem] leading-none font-black text-white tracking-tighter transition-all duration-100 shadow-emerald-500/10">0</span>
                <div class="w-full h-4 bg-slate-800 rounded-full mt-10 overflow-hidden border border-slate-700 shadow-inner"><div id="progress-bar" class="h-full bg-emerald-500 transition-all duration-300 ease-out w-0 shadow-[0_0_20px_rgba(16,185,129,0.5)]"></div></div>
                <span id="target-count-display" class="text-[10px] text-slate-600 mt-6 font-black tracking-[0.5em] uppercase">Target: 33</span>
            </div>

            <div class="w-full max-w-xs mt-auto z-30 pb-12"><button id="target-btn" class="w-full py-6 rounded-[2rem] bg-emerald-600 text-white font-black uppercase tracking-[0.3em] shadow-2xl active:scale-95 transition-all text-xs">Target: <span id="target-btn-text">33</span></button></div>
        </main>

        <!-- Relocated Bottom Back Button for Narrow Screens -->
        <button id="global-back-btn" onclick="goBack()" class="absolute bottom-[85px] left-6 w-14 h-14 bg-slate-800 border border-slate-700 backdrop-blur-xl text-emerald-400 rounded-2xl flex items-center justify-center shadow-2xl active:scale-90 z-[45] hidden">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
        </button>

        <!-- Navigation -->
        <nav id="bottom-nav" class="bg-slate-900 border-t border-slate-800/80 flex justify-around items-center h-[72px] px-2 shrink-0 z-30 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
            <button onclick="switchTab('home')" id="tab-btn-home" class="p-3 text-slate-500 transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg></button>
            <button onclick="switchTab('library')" id="tab-btn-library" class="p-3 text-slate-500 transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg></button>
            <button onclick="switchTab('router')" id="tab-btn-router" class="p-3 text-slate-500 transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></button>
            <button onclick="switchTab('journal')" id="tab-btn-journal" class="p-3 text-slate-500 transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>
            <button onclick="switchTab('counter')" id="tab-btn-counter" class="p-3 text-slate-500 transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 11V9a2 2 0 00-2-2m2 4v4a2 2 0 104 0v-1m-4-3H9m2 0h4m6 1a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></button>
        </nav>

        <!-- Reset Confirmation -->
        <div id="confirm-reset-modal" class="absolute inset-0 bg-slate-950/95 backdrop-blur-md z-[70] hidden flex-col items-center justify-center p-6 transition-opacity opacity-0">
            <div class="bg-slate-900 border border-slate-800 rounded-[2.5rem] p-10 w-full max-w-xs shadow-2xl text-center"><div class="w-20 h-20 bg-red-900/20 rounded-full flex items-center justify-center text-red-500 mx-auto mb-8 border border-red-500/20"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></div><h3 class="font-black text-white text-xl mb-4 uppercase tracking-widest">Reset Journey?</h3><p class="text-slate-500 text-sm mb-10">Permanently erase your lifetime count.</p><div class="flex flex-col gap-3"><button onclick="confirmResetStats()" class="w-full py-5 bg-red-600 text-white font-black rounded-2xl shadow-xl uppercase tracking-widest text-xs">Clear Data</button><button onclick="closeConfirmModal()" class="w-full py-5 bg-slate-800 text-slate-400 font-black rounded-2xl uppercase tracking-widest text-xs">Cancel</button></div></div>
        </div>
    </div>

    <script>
        // --- Core State ---
        let searchQuery = "";
        let activeTags = new Set();
        let templateLang = 'en';
        let count = 0;
        let target = 33;
        let breathingMode = false;
        let breathingTimer = null;
        let historyStack = ['home'];
        let currentTab = 'home';
        let currentNameData = null;
        let currentDhikrTarget = 'self';
        let soundEnabled = false;
        let audioCtx = null;
        
        let totalLifetimeDhikr = parseInt(localStorage.getItem('lifetime_dhikr') || '0');
        let isStatsHidden = localStorage.getItem('stats_hidden') === 'true';
        let journalEntries = JSON.parse(localStorage.getItem('journal_entries') || '[]');
        let recentNames = JSON.parse(localStorage.getItem('recent_names') || '[]');

        const namesData = [
            { id: 0, arabic: "ٱللَّٰهُ", transliteration: "Allah", meaning: "The One and Only God", tags: ["peace", "mercy", "strength"] },
            { id: 1, arabic: "ٱلرَّحْمَـٰنُ", transliteration: "Ar-Rahman", meaning: "The Entirely Merciful", tags: ["mercy", "compassion"] },
            { id: 2, arabic: "ٱلرَّحِيمُ", transliteration: "Ar-Rahim", meaning: "The Especially Merciful", tags: ["mercy", "forgiveness"] },
            { id: 5, arabic: "ٱلسَّلَامُ", transliteration: "As-Salam", meaning: "The Source of Peace", tags: ["peace", "anxiety", "conflict"] },
            { id: 6, arabic: "ٱلْمُؤْمِنُ", transliteration: "Al-Mu’min", meaning: "The Granter of Security", tags: ["safety", "fear", "protection"] },
            { id: 14, arabic: "ٱلْغَفَّارُ", transliteration: "Al-Ghaffar", meaning: "The Forgiving", tags: ["forgiveness", "repentance"] },
            { id: 18, arabic: "ٱلْفَتَّاحُ", transliteration: "Al-Fattah", meaning: "The Opener", tags: ["opportunity", "exams", "solutions"] },
            { id: 19, arabic: "ٱلْعَلِيمُ", transliteration: "Al-‘Alim", meaning: "The All-Knowing", tags: ["knowledge", "learning", "exams"] },
            { id: 30, arabic: "ٱللَّطِيفُ", transliteration: "Al-Latif", meaning: "The Subtle One", tags: ["anxiety", "calmness"] },
            { id: 46, arabic: "ٱلْحَكِيمُ", transliteration: "Al-Hakim", meaning: "The Wise", tags: ["wisdom", "decisions"] },
            { id: 47, arabic: "ٱلْوَدُودُ", transliteration: "Al-Wadud", meaning: "The Loving", tags: ["love", "marriage"] },
            { id: 62, arabic: "ٱلْحَيُّ", transliteration: "Al-Hayy", meaning: "The Ever-Living", tags: ["energy", "vitality"] },
            { id: 63, arabic: "ٱلْقَيُّومُ", transliteration: "Al-Qayyum", meaning: "The Sustainer", tags: ["stability", "support"] },
            { id: 84, arabic: "ٱلْوَكِيلُ", transliteration: "Al-Wakil", meaning: "The Trustee", tags: ["reliance", "trust"] }
        ];

        const routineLibrary = { morning: [0, 1, 2, 5, 18, 19, 62], evening: [0, 14, 30, 32, 38, 46, 63], crisis: [5, 30, 84] };

        function switchTab(tab, push = true) {
            if (tab === currentTab) return;
            if (push) historyStack.push(currentTab);
            currentTab = tab;
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            ['home', 'library', 'journal', 'counter', 'router'].forEach(t => document.getElementById(`tab-btn-${t}`)?.classList.remove('text-emerald-400'));
            const view = document.getElementById(`view-${tab}`); if(view) view.classList.add('active');
            const btn = document.getElementById(`tab-btn-${tab}`); if(btn) btn.classList.add('text-emerald-400');
            document.getElementById('bottom-nav').classList.toggle('hidden', tab === 'counter');
            document.getElementById('main-header').classList.toggle('hidden', tab === 'counter');
            const backBtn = document.getElementById('global-back-btn');
            if (backBtn) { backBtn.classList.toggle('hidden', historyStack.length <= 1); backBtn.style.bottom = tab === 'counter' ? '20px' : '85px'; }
            if (tab !== 'counter') stopBreathing();
            if (tab === 'home') updateStatsDisplay();
            if (tab === 'journal') renderJournal();
            if (tab === 'router') filterNames('router');
        }

        function goBack() { if (historyStack.length > 1) switchTab(historyStack.pop(), false); }

        function initApp() {
            currentNameData = namesData[0];
            renderTags('feelings-box', ["anger", "sadness", "anxious", "worried", "fatigue", "fear"]);
            renderTags('situations-box', ["exams", "job search", "leadership", "marriage", "conflict", "hardship"]);
            filterNames('library'); filterNames('router'); updateDayTrack(); updateStatsDisplay(); setupSafetyButtons();
        }

        function renderTags(id, items) { 
            const container = document.getElementById(id); if (!container) return;
            container.innerHTML = items.map(t => `<button onclick="toggleTag('${t}')" id="tag-${t}" class="px-3 py-1.5 rounded-lg text-[10px] font-black border border-slate-700 bg-slate-800 text-slate-400 transition-all m-1 uppercase tracking-tighter whitespace-nowrap">${t}</button>`).join(''); 
        }

        function toggleTag(t) { 
            activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t); 
            const el = document.getElementById(`tag-${t}`); if(el) el.classList.toggle('border-emerald-500'); filterNames('router'); 
        }

        function filterNames(ctx) {
            const list = document.getElementById(ctx + '-list'); if(!list) return;
            const res = namesData.filter(n => ctx === 'library' ? (!searchQuery || n.transliteration.toLowerCase().includes(searchQuery)) : (activeTags.size === 0 || Array.from(activeTags).some(t => n.tags.includes(t))));
            if (ctx === 'router' && activeTags.size > 0) {
                const banner = document.getElementById('combination-banner'); if(banner) banner.classList.remove('hidden');
                const mid = res.slice(0, 3).map(n => n.transliteration.replace(/^(Al-|Ar-|As-|An-|Ad-|At-|Az-|Ash-|Ak-|Aq-|Ah-|Am-)/i, ''));
                document.getElementById('combined-dua-text').innerHTML = `Ya Rahman Ya Rahim, <span class="text-indigo-400">Ya ${mid.join(', Ya ')}</span>, Ya Wakil, I place my trust in You.`;
                document.getElementById('short-dua-text').innerText = `Ya Rahman Ya Rahim, Ya Wakil — handle this.`;
            } else if (ctx === 'router') document.getElementById('combination-banner')?.classList.add('hidden');
            list.innerHTML = res.map(n => `<div onclick="openCounter(${n.id}); switchTab('counter')" class="bg-slate-800 border border-slate-700/50 p-6 rounded-[2rem] flex justify-between items-center active:scale-95 transition-all mb-3 shadow-sm"><div><h3 class="font-black text-white text-lg uppercase tracking-tight">${n.transliteration}</h3><p class="text-xs text-slate-500">${n.meaning}</p></div><span class="text-3xl font-serif text-emerald-500">${n.arabic}</span></div>`).join('');
        }

        function startWeavedDua() { openCounter(0, false, 33); switchTab('counter'); }

        function updateDayTrack() {
            const day = new Date().getDate(), name = namesData[(day - 1) % namesData.length];
            document.getElementById('track-day-label').innerText = `Day ${day} of 30`;
            document.getElementById('track-name-trans').innerText = name.transliteration;
            document.getElementById('track-name-meaning').innerText = name.meaning;
            document.getElementById('track-progress-dots').innerHTML = Array(5).fill(0).map((_, i) => `<div class="w-1.5 h-1.5 rounded-full ${i < (day % 5) ? 'bg-indigo-400' : 'bg-slate-700'}"></div>`).join('');
        }

        function startDayTrack() { openCounter(namesData[(new Date().getDate() - 1) % namesData.length].id, false, 100); switchTab('counter'); }

        function openCounter(id, fromRoutine = false, customTarget = 33) {
            currentNameData = namesData.find(n => n.id === id) || namesData[0];
            target = customTarget;
            document.getElementById('counter-arabic').innerText = currentNameData.arabic;
            document.getElementById('counter-transliteration').innerText = currentNameData.transliteration;
            document.getElementById('counter-meaning').innerText = currentNameData.meaning;
            document.getElementById('target-btn-text').innerText = target;
            document.getElementById('target-count-display').innerText = 'Target: ' + target;
            resetCounter(); setDhikrTarget('self');
            document.getElementById('routine-progress').classList.toggle('hidden', !fromRoutine);
        }

        function toggleBreathingMode() {
            breathingMode = !breathingMode;
            const btn = document.getElementById('breathing-toggle-btn');
            btn.innerText = breathingMode ? 'Pacer On' : 'Pacer Off';
            btn.classList.toggle('text-emerald-400', breathingMode);
            document.getElementById('view-counter').classList.toggle('breathing-active', breathingMode);
            document.getElementById('breathing-line-container').classList.toggle('hidden', !breathingMode);
            if (breathingMode) startBreathing(); else stopBreathing();
        }

        function startBreathing() {
            const line = document.getElementById('breathing-line'); if (!line) return;
            const loop = () => { line.style.transition = 'width 4s linear'; line.style.width = '100%'; setTimeout(() => { line.style.transition = 'none'; setTimeout(() => { line.style.transition = 'width 6s linear'; line.style.width = '0%'; }, 2000); }, 4000); };
            loop(); breathingTimer = setInterval(loop, 12000);
        }

        function stopBreathing() { clearInterval(breathingTimer); breathingMode = false; }

        function incrementCounter() {
            count++; totalLifetimeDhikr++; localStorage.setItem('lifetime_dhikr', totalLifetimeDhikr);
            if (navigator.vibrate) count === target ? navigator.vibrate([200, 100, 200]) : navigator.vibrate(15);
            playTick(count === target); updateUI();
            const el = document.getElementById('current-count'); if(el) { el.style.transform = 'scale(0.9)'; setTimeout(() => el.style.transform = 'scale(1)', 100); }
        }

        function resetCounter() { count = 0; updateUI(); }
        function updateUI() {
            document.getElementById('current-count').innerText = count;
            document.getElementById('progress-bar').style.width = `${Math.min(count / target, 1) * 100}%`;
            const btn = document.getElementById('target-btn'); if (!btn) return;
            if (count >= target) { btn.innerHTML = 'Write Reflection'; btn.classList.add('animate-pulse'); }
            else { btn.innerHTML = `Target: <span id="target-btn-text">${target}</span>`; btn.classList.remove('animate-pulse'); }
        }

        function setupSafetyButtons() {
            const btns = [ { id: 'btn-reset', act: resetCounter }, { id: 'target-btn', act: () => count >= target ? openJournal() : openTargetModal() }, { id: 'btn-reset-stats', act: () => document.getElementById('confirm-reset-modal').classList.remove('hidden') } ];
            btns.forEach(c => {
                const el = document.getElementById(c.id); if (!el) return;
                let timer, fired = false;
                const start = () => { fired = false; if (count === 0 || count >= target || c.id==='btn-reset-stats') { if(c.id==='btn-reset-stats'){timer=setTimeout(()=> {fired=true; c.act();},1000); el.style.opacity='0.5';} else {fired=true; c.act();} return; }
                    el.style.opacity = '0.5'; timer = setTimeout(() => { fired = true; c.act(); el.style.opacity = '1'; }, 1000); };
                const end = () => { clearTimeout(timer); el.style.opacity = '1'; if (!fired && (count > 0 || c.id==='btn-reset-stats')) { const old = el.innerHTML; el.innerHTML = `<span class="text-[10px]">HOLD</span>`; setTimeout(() => el.innerHTML = old, 800); } };
                el.onmousedown = start; el.onmouseup = end; el.ontouchstart = start; el.ontouchend = end;
            });
        }

        function startRoutine(type) { openCounter(routineLibrary[type][0], true); switchTab('counter'); }
        function toggleStatsVisibility() { isStatsHidden = !isStatsHidden; localStorage.setItem('stats_hidden', isStatsHidden); updateStatsDisplay(); }
        function updateStatsDisplay() { const s = document.getElementById('lifetime-stats'); if (s) s.innerText = isStatsHidden ? '••••' : totalLifetimeDhikr.toLocaleString(); }
        function confirmResetStats() { totalLifetimeDhikr = 0; localStorage.setItem('lifetime_dhikr', '0'); updateStatsDisplay(); closeConfirmModal(); if (navigator.vibrate) navigator.vibrate([100, 50, 100]); }
        function closeConfirmModal() { document.getElementById('confirm-reset-modal').classList.add('hidden'); }
        function handleSearch(e) { searchQuery = e.target.value.toLowerCase(); filterNames('library'); }
        function clearFilters() { activeTags.clear(); filterNames('router'); }
        function openTargetModal() { document.getElementById('target-modal').classList.remove('hidden'); document.getElementById('target-modal').classList.add('flex'); void document.getElementById('target-modal').offsetWidth; document.getElementById('target-modal').classList.add('opacity-100'); }
        function closeTargetModal() { document.getElementById('target-modal').classList.remove('opacity-100'); setTimeout(() => document.getElementById('target-modal').classList.add('hidden'), 300); }
        function quickSetTarget(v) { document.getElementById('custom-target-input').value = v; }
        function saveCustomTarget() { target = parseInt(document.getElementById('custom-target-input').value) || 33; updateUI(); closeTargetModal(); }
        function openJournal() { document.getElementById('journal-write-modal').classList.remove('hidden'); document.getElementById('journal-write-modal').classList.add('flex'); void document.getElementById('journal-write-modal').offsetWidth; document.getElementById('journal-write-modal').classList.add('opacity-100'); document.getElementById('journal-input').focus(); }
        function closeJournalModal() { document.getElementById('journal-write-modal').classList.remove('opacity-100'); setTimeout(() => document.getElementById('journal-write-modal').classList.add('hidden'), 300); }
        function saveJournalEntry() { const t = document.getElementById('journal-input').value; if(t) { journalEntries.unshift({date: new Date().toLocaleDateString(), name: currentNameData.transliteration, text: t}); localStorage.setItem('journal_entries', JSON.stringify(journalEntries)); renderJournal(); } closeJournalModal(); resetCounter(); switchTab('journal'); }
        function renderJournal() { const list = document.getElementById('journal-entries-list'); if(list) list.innerHTML = journalEntries.map(e => `<div class="bg-slate-800 border border-slate-700/50 p-6 rounded-3xl mb-4 shadow-sm"><div><span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">${e.date}</span><h4 class="font-bold text-white mt-1 text-lg">${e.name}</h4><p class="text-slate-400 text-sm mt-3 leading-relaxed">${e.text}</p></div></div>`).join(''); }
        function toggleSound() { soundEnabled = !soundEnabled; if(soundEnabled) initAudio(); document.getElementById('sound-btn').classList.toggle('text-emerald-400', soundEnabled); }
        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playTick(s) { if(!soundEnabled || !audioCtx) return; const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = s ? 'triangle' : 'sine'; o.frequency.setValueAtTime(s ? 880 : 440, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1); }
        function toggleExpand(id, b) { document.getElementById(id).classList.toggle('tag-collapsed'); b.innerText = document.getElementById(id).classList.contains('tag-collapsed') ? "Show All" : "Show Less"; }
        function setDhikrTarget(t) { currentDhikrTarget = t; ['self','family','him','her'].forEach(p => { const el = document.getElementById(`target-pill-${p}`); if(el) el.className = `px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest ${p===t ? 'bg-emerald-600 text-white' : 'bg-slate-800 border border-slate-700 text-slate-500'}`; }); generateTemplate(currentNameData, t); }
        function generateTemplate(n, t) { const ya = "Ya " + n.transliteration.replace(/^(Al-|Ar-|As-|An-|Ad-|At-|Az-|Ash-|Ak-|Aq-|Ah-|Am-)/i, ''); document.getElementById('counter-template').innerText = `"${ya}, bless ${t==='self'?'me':t==='family'?'my family':t} with mercy and wisdom today."`; }
        function handleMainTap(e) { if (e.target.closest('button') || e.target.closest('.no-tap')) return; incrementCounter(); }
        window.onload = initApp;
    </script>
</body>
</html>
