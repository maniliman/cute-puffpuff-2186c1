    <style>
        body { background-color: #020617; color: #f8fafc; overflow: hidden; height: 100dvh; width: 100vw; }
        .tap-target { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; }
        .tap-target:active { transform: scale(0.95); }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .no-select { user-select: none; -webkit-user-select: none; }
        .view-content { display: none; height: 100%; width: 100%; flex-direction: column; overflow-y: auto; padding-bottom: 140px; }
        .view-content.active { display: flex; }

        .tag-container { transition: max-height 0.3s ease-in-out; }
        .tag-collapsed { max-height: 110px; overflow: hidden; position: relative; }
        .tag-collapsed::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 40px; background: linear-gradient(to bottom, transparent, #0f172a); pointer-events: none; }

        @keyframes breathingPulse {
            0% { box-shadow: 0 0 0px 0px rgba(52, 211, 153, 0); transform: scale(1); }
            33% { box-shadow: 0 0 60px 20px rgba(52, 211, 153, 0.4); transform: scale(1.05); } /* Inhale 4s */
            50% { box-shadow: 0 0 60px 20px rgba(52, 211, 153, 0.4); transform: scale(1.05); } /* Hold 2s */
            100% { box-shadow: 0 0 0px 0px rgba(52, 211, 153, 0); transform: scale(1); } /* Exhale 6s */
        }
        .breathing-active #current-count-container { animation: breathingPulse 12s ease-in-out infinite; border-radius: 50%; }
        #breathing-line { height: 6px; background: #34d399; width: 0%; transition: width 0s linear; box-shadow: 0 0 15px #34d399; }
        
        #global-back-btn { transition: all 0.2s; z-index: 100; }
        #global-back-btn.hidden { opacity: 0; pointer-events: none; transform: translateX(-10px); }
    </style>

<body class="font-sans antialiased flex justify-center no-select">

    <div class="w-full max-w-md bg-slate-900 h-full shadow-2xl relative flex flex-col overflow-hidden border-x border-slate-800/50">
        
        <!-- HEADER -->
        <header id="main-header" class="bg-slate-900 border-b border-slate-800/80 p-5 z-10 shrink-0">
            <h1 class="text-xl font-black tracking-tight text-white uppercase italic">Asmaul Husna</h1>
            <p id="header-subtitle" class="text-emerald-400 text-[10px] font-black uppercase tracking-widest">Level-2 Precision</p>
        </header>

        <!-- === VIEW: HOME === -->
        <main id="view-home" class="view-content active p-5 fade-in">
            <div class="mb-8">
                <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Precision Alignment</h2>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <button onclick="startRoutine('dawn')" class="bg-slate-800 border border-slate-700/50 p-4 rounded-3xl flex flex-col items-start gap-2 active:scale-95 transition-all">
                        <span class="text-xl">🌅</span>
                        <h3 class="font-bold text-white text-[11px] uppercase">Dawn</h3>
                    </button>
                    <button onclick="startRoutine('midmorning')" class="bg-slate-800 border border-slate-700/50 p-4 rounded-3xl flex flex-col items-start gap-2 active:scale-95 transition-all">
                        <span class="text-xl">💼</span>
                        <h3 class="font-bold text-white text-[11px] uppercase">Morning</h3>
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <button onclick="startRoutine('midday')" class="bg-slate-800 border border-slate-700/50 p-4 rounded-3xl flex flex-col items-start gap-2 active:scale-95 transition-all">
                        <span class="text-xl">⚖️</span>
                        <h3 class="font-bold text-white text-[11px] uppercase">Midday</h3>
                    </button>
                    <button onclick="startRoutine('afternoon')" class="bg-slate-800 border border-slate-700/50 p-4 rounded-3xl flex flex-col items-start gap-2 active:scale-95 transition-all">
                        <span class="text-xl">💡</span>
                        <h3 class="font-bold text-white text-[11px] uppercase">Afternoon</h3>
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <button onclick="startRoutine('sunset')" class="bg-slate-800 border border-slate-700/50 p-4 rounded-3xl flex flex-col items-start gap-2 active:scale-95 transition-all">
                        <span class="text-xl">🌇</span>
                        <h3 class="font-bold text-white text-[11px] uppercase">Sunset</h3>
                    </button>
                    <button onclick="startRoutine('night')" class="bg-slate-800 border border-slate-700/50 p-4 rounded-3xl flex flex-col items-start gap-2 active:scale-95 transition-all">
                        <span class="text-xl">🌌</span>
                        <h3 class="font-bold text-white text-[11px] uppercase">Night</h3>
                    </button>
                </div>
                <button onclick="startRoutine('crisis')" class="w-full mt-1 bg-emerald-900/10 border border-emerald-800/30 p-5 rounded-3xl flex items-center gap-4 active:scale-95 transition-all shadow-lg">
                    <span class="text-2xl">🫁</span>
                    <h3 class="font-black text-emerald-400 text-xs uppercase tracking-widest text-left">60s Precision Reset</h3>
                </button>
            </div>

            <div class="mb-8">
                <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Mastery Track</h2>
                <div onclick="startDayTrack()" class="bg-gradient-to-br from-indigo-950 to-slate-800 border border-indigo-500/20 p-6 rounded-[2rem] relative overflow-hidden cursor-pointer active:scale-95 transition-all shadow-xl">
                    <span id="track-day-label" class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-400 block mb-2">Day 1</span>
                    <h3 id="track-name-trans" class="text-2xl font-black text-white">Ya Rahman</h3>
                    <p id="track-name-meaning" class="text-slate-400 text-[10px] uppercase mt-1 tracking-widest">Focus on Mercy</p>
                </div>
            </div>

            <div class="mb-8">
                <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4">Journey Stats</h2>
                <div class="bg-slate-800 border border-slate-700/50 p-6 rounded-[2rem] shadow-inner relative">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mb-1">Lifetime Dhikr</p>
                            <p id="lifetime-stats" class="text-4xl font-black text-white tracking-tighter">0</p>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="toggleStatsVisibility()" class="p-2.5 bg-slate-900 rounded-xl text-slate-400 active:text-emerald-400 border border-slate-700/50">
                                <svg class="w-4 h-4" id="eye-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            </button>

                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- === VIEW: LIBRARY === -->
        <main id="view-library" class="view-content p-5 fade-in">
            <input type="text" id="library-search" onkeyup="handleSearch(event)" placeholder="Search names..." class="w-full px-5 py-4 rounded-2xl border border-slate-700 bg-slate-800 text-white outline-none mb-6">
            <div id="library-list" class="space-y-3"></div>
        </main>

        <!-- === VIEW: ROUTER (WEAVER) === -->
        <main id="view-router" class="view-content p-5 fade-in">
            <div class="space-y-4 mb-6">
                <div class="bg-slate-800 p-4 rounded-3xl border border-slate-700/30 shadow-inner">
                    <div class="flex justify-between items-center mb-3 text-[10px] font-black uppercase text-slate-500 tracking-widest">
                        <span>1. Internal (Feelings)</span>
                        <button onclick="toggleExpand('feelings-box', this)" class="text-emerald-400 uppercase tracking-tighter">Show All</button>
                    </div>
                    <div id="feelings-box" class="flex flex-wrap gap-2 tag-container tag-collapsed"></div>
                </div>
                <div class="bg-slate-800 p-4 rounded-3xl border border-slate-700/30 shadow-inner">
                    <div class="flex justify-between items-center mb-3 text-[10px] font-black uppercase text-slate-500 tracking-widest">
                        <span>2. External (Situations)</span>
                        <button onclick="toggleExpand('situations-box', this)" class="text-emerald-400 uppercase tracking-tighter">Show All</button>
                    </div>
                    <div id="situations-box" class="flex flex-wrap gap-2 tag-container tag-collapsed"></div>
                </div>
                <div class="bg-slate-800 p-4 rounded-3xl border border-slate-700/30 shadow-inner">
                    <div class="flex justify-between items-center mb-3 text-[10px] font-black uppercase text-slate-500 tracking-widest">
                        <span>3. Goal (Intentions)</span>
                        <button onclick="toggleExpand('intentions-box', this)" class="text-emerald-400 uppercase tracking-tighter">Show All</button>
                    </div>
                    <div id="intentions-box" class="flex flex-wrap gap-2 tag-container tag-collapsed"></div>
                </div>
            </div>

            <div id="combination-banner" class="hidden">
                <div class="bg-indigo-900 border border-indigo-400/30 p-7 rounded-[2rem] shadow-2xl relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>
                    <p class="text-[9px] font-black text-indigo-300 uppercase tracking-widest mb-4">The Formula</p>
                    <p id="combined-dua-text" class="text-xl font-serif text-white italic leading-relaxed mb-6"></p>
                    <div class="flex gap-2">
                        <button onclick="clearFilters()" class="px-4 py-2 bg-slate-900 text-[10px] font-black text-slate-500 rounded-xl uppercase">Reset</button>
                        <button onclick="startWeavedDua()" class="flex-1 py-4 bg-emerald-600 text-white text-xs font-black rounded-2xl shadow-xl active:scale-95 uppercase tracking-widest">Begin Weaved</button>
                    </div>
                </div>
            </div>
            <div id="router-list" class="mt-4 space-y-3"></div>
        </main>

        <!-- === VIEW: JOURNAL === -->
        <main id="view-journal" class="view-content p-5 fade-in">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-4 text-center">Reflections</h2>
            <div id="journal-entries-list" class="space-y-4"></div>
        </main>

        <!-- === VIEW: TASBIH === -->
        <main id="view-counter" onclick="handleMainTap(event)" class="view-content items-center p-6 bg-slate-900 z-20 fade-in select-none cursor-pointer">
            <div class="absolute top-6 left-6 right-6 flex justify-between items-center z-30">
                <button onclick="switchTab('home')" class="p-3 bg-slate-800 rounded-2xl text-slate-400 active:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round"/></svg></button>
                <div class="flex gap-2">
                    <button onclick="toggleBreathingMode()" id="breathing-toggle-btn" class="px-4 py-2 bg-slate-800 rounded-2xl text-[9px] font-black text-slate-400 border border-slate-700 uppercase tracking-tighter">Pacer Off</button>
                    <button id="btn-reset" class="p-3 bg-slate-800 rounded-2xl text-slate-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2"/></svg></button>
                </div>
            </div>

            <div id="breathing-line-container" class="absolute top-20 left-0 right-0 h-1.5 hidden bg-slate-800/30"><div id="breathing-line"></div></div>

            <div class="text-center mt-20 mb-4 w-full flex flex-col items-center px-4">
                <div id="routine-progress" class="hidden mb-6 px-4 py-1.5 rounded-full bg-slate-800 border border-slate-700 text-[10px] font-black text-slate-400 tracking-[0.3em] uppercase shadow-lg">STEP: <span id="routine-step" class="text-emerald-400">1/7</span></div>
                
                <h2 id="counter-arabic" class="text-6xl font-black text-white mb-2 font-serif" dir="rtl"></h2>
                <h3 id="counter-transliteration" class="text-2xl font-black text-emerald-400 uppercase tracking-tighter text-center leading-tight"></h3>
                <p id="counter-meaning" class="text-slate-500 text-[10px] uppercase mt-2 font-black tracking-widest text-center"></p>
                <div id="how-to-ask-box" class="mt-8 px-6 py-5 bg-slate-800 rounded-[2rem] border border-slate-700/50 max-w-xs w-full shadow-inner"><p id="counter-template" class="text-sm text-white font-serif italic leading-relaxed text-center"></p></div>
            </div>

            <div class="mt-8 mb-8 w-full max-w-xs flex flex-col items-center justify-center" id="current-count-container">
                <span id="current-count" class="text-[8.5rem] leading-none font-black text-white tracking-tighter">0</span>
                <div class="w-full h-3 bg-slate-800 rounded-full mt-10 overflow-hidden"><div id="progress-bar" class="h-full bg-emerald-500 transition-all duration-300 w-0 shadow-[0_0_15px_rgba(16,185,129,0.5)]"></div></div>
                <span id="target-count-display" class="text-[9px] text-slate-600 mt-4 font-black uppercase tracking-[0.5em]">Target: 33</span>
            </div>

            <div class="w-full max-w-xs mt-auto flex flex-col gap-3 pb-10">
                <button id="reflect-btn" onclick="openJournal()" class="hidden w-full py-4 rounded-2xl bg-indigo-600 text-white font-black uppercase tracking-widest text-[10px] shadow-xl active:scale-95">Capture Reflection</button>
                <button id="target-btn" class="w-full py-6 rounded-[2rem] bg-emerald-600 text-white font-black uppercase tracking-widest text-xs shadow-2xl active:scale-95">Target: <span id="target-btn-text">33</span></button>
            </div>
        </main>

        <!-- Fixed Bottom Back Button -->
        <button id="global-back-btn" onclick="goBack()" class="absolute bottom-[90px] left-6 w-14 h-14 bg-slate-800 border border-slate-700 backdrop-blur-xl text-emerald-400 rounded-2xl flex items-center justify-center shadow-2xl active:scale-90 hidden">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
        </button>

        <!-- Navigation Bar -->
        <nav id="bottom-nav" class="bg-slate-900 border-t border-slate-800/80 flex justify-around items-center h-[72px] px-6 shrink-0 z-30 shadow-2xl">
            <button onclick="switchTab('home')" id="tab-btn-home" class="p-2 text-slate-500 transition-all"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg></button>
            <button onclick="switchTab('library')" id="tab-btn-library" class="p-2 text-slate-500 transition-all"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></button>
            <button onclick="switchTab('router')" id="tab-btn-router" class="p-2 text-slate-500 transition-all"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></button>
            <button onclick="switchTab('journal')" id="tab-btn-journal" class="p-2 text-slate-500 transition-all"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>
            <button onclick="switchTab('counter')" id="tab-btn-counter" class="p-2 text-slate-500 transition-all"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M11 11V9a2 2 0 00-2-2m2 4v4a2 2 0 104 0v-1m-4-3H9m2 0h4m6 1a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></button>
        </nav>

        <!-- Modals -->
        <div id="confirm-reset-modal" class="absolute inset-0 bg-slate-950/95 backdrop-blur-md z-[100] hidden flex-col items-center justify-center p-6 transition-opacity opacity-0">
            <div class="bg-slate-900 border border-slate-800 rounded-[3rem] p-10 w-full max-w-xs text-center shadow-2xl">
                <div class="w-20 h-20 bg-red-900/20 rounded-full flex items-center justify-center text-red-500 mx-auto mb-8 border border-red-500/20"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></div>
                <h3 class="font-black text-white text-xl mb-4 uppercase tracking-widest">Reset Journey?</h3>
                <button onclick="confirmResetStats()" class="w-full py-5 bg-red-600 text-white font-black rounded-2xl mb-3 active:scale-95 shadow-lg uppercase tracking-widest text-xs">Clear Journey</button>
                <button onclick="closeConfirmModal()" class="w-full py-5 bg-slate-800 text-slate-400 font-black rounded-2xl active:scale-95 uppercase tracking-widest text-xs">Cancel</button>
            </div>
        </div>

        <div id="journal-write-modal" class="absolute inset-0 bg-slate-950/95 backdrop-blur-xl z-[80] hidden flex-col p-6 transition-opacity opacity-0">
            <div class="flex justify-between items-center mb-8 shrink-0"><h3 class="font-bold text-white text-xl uppercase italic">Reflect</h3><button onclick="closeJournalModal()" class="text-slate-400 p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2"/></svg></button></div>
            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 flex-1 flex flex-col shadow-2xl"><p id="journal-prompt" class="text-emerald-400 font-serif mb-6 text-lg italic leading-relaxed"></p><textarea id="journal-input" class="w-full flex-1 bg-transparent text-white outline-none resize-none text-xl" placeholder="Reflect..."></textarea><button onclick="saveJournalEntry()" class="w-full mt-6 bg-emerald-600 text-white font-black py-5 rounded-2xl uppercase tracking-widest">Save Reflection</button></div>
        </div>
        
        <div id="target-modal" class="absolute inset-0 bg-slate-950/90 z-[75] hidden flex-col items-center justify-center p-6 transition-opacity opacity-0">
            <div class="bg-slate-800 rounded-[2.5rem] p-8 w-full max-w-xs border border-slate-700 shadow-2xl"><h3 class="font-black text-white text-lg mb-6 text-center uppercase tracking-widest">Set Goal</h3><input type="number" id="custom-target-input" class="w-full bg-slate-900 rounded-2xl px-4 py-5 text-center text-4xl font-black text-emerald-400 mb-6 border border-slate-700 outline-none" value="33"><div class="flex gap-2 mb-6"><button onclick="quickSetTarget(33)" class="flex-1 py-3 bg-slate-700 rounded-xl text-white font-bold">33</button><button onclick="quickSetTarget(99)" class="flex-1 py-3 bg-slate-700 rounded-xl text-white font-bold">99</button><button onclick="quickSetTarget(100)" class="flex-1 py-3 bg-slate-700 rounded-xl text-white font-bold">100</button></div><div class="flex gap-3"><button onclick="closeTargetModal()" class="flex-1 py-4 bg-slate-700 rounded-2xl text-slate-300 font-bold uppercase text-[10px] tracking-widest">Cancel</button><button onclick="saveCustomTarget()" class="flex-1 py-4 bg-emerald-600 rounded-2xl text-white font-bold uppercase text-[10px] tracking-widest">Confirm</button></div></div>
        </div>
    </div>

    <script>
        // --- Core State ---
        let searchQuery = "";
        let activeTags = new Set();
        let historyStack = ['home'], currentTab = 'home';
        let count = 0, target = 33, breathingMode = false, breathingTimer = null;
        let currentNameData = null, totalLifetimeDhikr = parseInt(localStorage.getItem('lifetime_dhikr') || '0');
        let isStatsHidden = localStorage.getItem('stats_hidden') === 'true';
        let journalEntries = JSON.parse(localStorage.getItem('journal_entries') || '[]');
        let routineQueue = [], routineIndex = 0, isRoutineActive = false;
        let soundEnabled = false, audioCtx = null;
        let activeWeavedFormula = "";

        // --- Clean Names Helper ---
        function clean(name) {
            return name.replace(/^(Al-|Ar-|As-|An-|Ad-|At-|Az-|Ash-|Ak-|Aq-|Ah-|Am-)/i, '');
        }

        const namesData = [
            { id: 1, arabic: "ٱلرَّحْمَـٰنُ", transliteration: "Ar-Rahman", meaning: "The Entirely Merciful", tags: ["mercy", "anxiety", "hardship", "grief", "sadness"] },
            { id: 2, arabic: "ٱلرَّرحِيمُ", transliteration: "Ar-Rahim", meaning: "The Especially Merciful", tags: ["mercy", "healing", "repentance"] },
            { id: 5, arabic: "ٱلسَّلَامُ", transliteration: "As-Salam", meaning: "The Source of Peace", tags: ["peace", "anxiety", "stress", "insomnia"] },
            { id: 6, arabic: "ٱلْمُؤْمِنُ", transliteration: "Al-Mu’min", meaning: "The Giver of Security", tags: ["safety", "fear", "insecure"] },
            { id: 8, arabic: "ٱلْعَزِيزُ", transliteration: "Al-Aziz", meaning: "The Mighty", tags: ["strength", "courage", "authority"] },
            { id: 9, arabic: "ٱلْجَبَّارُ", transliteration: "Al-Jabbar", meaning: "The Compeller", tags: ["healing", "heartbreak", "betrayal"] },
            { id: 12, arabic: "ٱلشَّكُورُ", transliteration: "Ash-Shakur", meaning: "The Appreciative", tags: ["gratitude", "rewards"] },
            { id: 13, arabic: "ٱلْعَلِيُّ", transliteration: "Al-Ali", meaning: "The Most High", tags: ["status", "elevation"] },
            { id: 14, arabic: "ٱلْغَفَّارُ", transliteration: "Al-Ghaffar", meaning: "The Forgiving", tags: ["forgiveness", "repentance", "guilt"] },
            { id: 17, arabic: "ٱلرَّزَّاقُ", transliteration: "Ar-Razzaq", meaning: "The Provider", tags: ["provision", "wealth", "finances"] },
            { id: 18, arabic: "ٱلْفَتَّاحُ", transliteration: "Al-Fattah", meaning: "The Opener", tags: ["opportunity", "exams", "job search"] },
            { id: 19, arabic: "ٱلْعَلِيمُ", transliteration: "Al-‘Alim", meaning: "The All-Knowing", tags: ["knowledge", "learning", "wisdom"] },
            { id: 23, arabic: "ٱلْمُعِزُّ", transliteration: "Al-Mu’izz", meaning: "The Giver of Honor", tags: ["respect", "status", "promotion"] },
            { id: 26, arabic: "ٱلسَّمِيعُ", transliteration: "As-Sami", meaning: "The All-Hearing", tags: ["performance", "authority"] },
            { id: 30, arabic: "ٱللَّطِيفُ", transliteration: "Al-Latif", meaning: "The Subtle One", tags: ["anxiety", "ease", "unseen help"] },
            { id: 32, arabic: "ٱلْحَلِيمُ", transliteration: "Al-Halim", meaning: "The Forbearing", tags: ["anger", "patience", "parenting"] },
            { id: 38, arabic: "ٱلْحَافِظُ", transliteration: "Al-Hafiz", meaning: "The Preserver", tags: ["protection", "safety", "travel"] },
            { id: 46, arabic: "ٱلْحَكِيمُ", transliteration: "Al-Hakim", meaning: "The Wise", tags: ["wisdom", "decisions", "strategy", "clarity"] },
            { id: 47, arabic: "ٱلْوَدُودُ", transliteration: "Al-Wadud", meaning: "The Loving", tags: ["love", "loneliness", "marriage", "harmony"] },
            { id: 52, arabic: "ٱلْقَوِيُّ", transliteration: "Al-Qawiy", meaning: "The Strong", tags: ["strength", "physical power"] },
            { id: 62, arabic: "ٱلْحَيُّ", transliteration: "Al-Hayy", meaning: "The Ever-Living", tags: ["fatigue", "energy", "vitality"] },
            { id: 63, arabic: "ٱلْقَيُّومُ", transliteration: "Al-Qayyum", meaning: "The Sustainer", tags: ["stability", "support", "balance"] },
            { id: 75, arabic: "ٱلنُّورُ", transliteration: "An-Nur", meaning: "The Light", tags: ["clarity", "guidance"] },
            { id: 76, arabic: "ٱلْهَادِي", transliteration: "Al-Hadi", meaning: "The Guide", tags: ["guidance", "confusion", "lost"] },
            { id: 82, arabic: "ٱلْعَفُوُّ", transliteration: "Al-Afu", meaning: "The Pardoner", tags: ["forgiveness"] },
            { id: 84, arabic: "ٱلْوَكِيلُ", transliteration: "Al-Wakil", meaning: "The Trustee", tags: ["reliance", "trust", "surrender"] },
            { id: 94, arabic: "ٱلرَّشِيدُ", transliteration: "Ar-Rashid", meaning: "The Guide", tags: ["decisions", "right judgment"] },
            { id: 98, arabic: "ٱلصَّبُورُ", transliteration: "As-Sabur", meaning: "The Patient", tags: ["patience", "hardship", "waiting"] },
            { id: 99, arabic: "ٱللَّٰهُ", transliteration: "Allah", meaning: "The One", tags: ["surrender"] }
        ];

        // --- Initialization ---
        function initApp() {
            const feelLib = ["anxiety", "sadness", "anger", "fear", "fatigue", "overwhelmed", "confusion", "heartbreak", "burnout", "guilt", "regret", "joy", "loneliness", "despair", "jealousy", "peaceful", "inspired", "grateful", "resentful", "determined", "content", "insecure", "vulnerable", "euphoric", "frustrated", "impatient", "jittery", "melancholy", "panic", "pessimistic", "satisfied", "startled", "zealous"];
            const faceLib = ["exams", "job search", "leadership", "marriage", "family", "conflict", "hardship", "business growth", "public speaking", "travel", "debt", "addiction", "physical illness", "buying a home", "moving city", "legal trouble", "parenting", "aging", "grief", "unemployment", "promotion", "betrayal", "pregnancy", "post-partum", "insomnia", "digital detox", "community work", "interview"];
            const intendLib = ["peace", "wisdom", "healing", "protection", "provision", "clarity", "resilience", "honor", "discipline", "control", "wealth", "forgiveness", "love", "focus", "energy", "guidance", "patience", "purity", "courage", "gratitude", "trust", "surrender", "success", "tranquility"];

            renderTags('feelings-box', feelLib);
            renderTags('situations-box', faceLib);
            renderTags('intentions-box', intendLib);
            
            filterNames('library'); 
            filterNames('router'); 
            updateDayTrack(); 
            updateStatsDisplay(); 
            setupGlobalEvents();
        }

        function renderTags(id, items) { 
            const container = document.getElementById(id); if (!container) return;
            container.innerHTML = items.map(t => `<button onclick="toggleTag('${t}')" id="tag-${t}" class="px-3 py-1.5 rounded-lg text-[10px] font-black border border-slate-700 bg-slate-800 text-slate-400 transition-all m-1 uppercase tracking-tighter whitespace-nowrap">${t}</button>`).join(''); 
        }

        function toggleTag(t) { 
            activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t); 
            const el = document.getElementById(`tag-${t}`); if(el) el.classList.toggle('border-emerald-500'); filterNames('router'); 
        }

        function filterNames(ctx) {
            const list = document.getElementById(ctx + '-list'); if(!list) return;
            const res = namesData.filter(n => ctx === 'library' ? (!searchQuery || n.transliteration.toLowerCase().includes(searchQuery)) : (activeTags.size === 0 || Array.from(activeTags).some(t => n.tags.includes(t))));
            
            if (ctx === 'router' && activeTags.size > 0) {
                const banner = document.getElementById('combination-banner'); if(banner) banner.classList.remove('hidden');
                const situationSet = res.filter(n => n.id !== 1 && n.id !== 2).slice(0, 3);
                const midStr = situationSet.length > 0 ? situationSet.map(n => "Ya " + clean(n.transliteration)).join(', ') : "Ya Latif";
                const formula = `Ya Rahman Ya Rahim, <span class='text-indigo-400'>${midStr}</span>, Ya Wakil, I place my trust in You.`;
                document.getElementById('combined-dua-text').innerHTML = formula;
                activeWeavedFormula = formula;
            } else if (ctx === 'router') document.getElementById('combination-banner')?.classList.add('hidden');
            
            list.innerHTML = res.map(n => `<div onclick="openCounter(${n.id}); switchTab('counter')" class="bg-slate-800 border border-slate-700/50 p-6 rounded-[2rem] flex justify-between items-center active:scale-95 transition-all mb-3 shadow-sm"><div><h3 class="font-black text-white text-lg uppercase tracking-tight">${n.transliteration}</h3><p class="text-[10px] text-slate-500 uppercase">${n.meaning}</p></div><span class="text-3xl font-serif text-emerald-500">${n.arabic}</span></div>`).join('');
        }

        // --- Routine Flow ---
        function startRoutine(type) {
            isRoutineActive = true;
            routineIndex = 0;
            const sets = {
                dawn: { q: [62, 63, 18, 94], t: 33, instr: "Focus: Direction + Energy" },
                midmorning: { q: [8, 46, 26, 23], t: 33, instr: "Focus: Authority + Precision" },
                midday: { q: [5, 30, 84], t: 33, instr: "Focus: Pressure Control" },
                afternoon: { q: [75, 19, 46], t: 33, instr: "Focus: Focus + Analysis" },
                sunset: { q: [17, 12, 13], t: 33, instr: "Focus: Expansion + Contentment" },
                night: { q: [14, 82, 5, 38], t: 11, instr: "Focus: Release + Safety" },
                morning: { q: [62, 63, 5, 18, 17, 76], t: 33, instr: "Alignment" },
                evening: { q: [14, 82, 38, 30, 1], t: 11, instr: "Night Reset" },
                crisis: { q: [5, 30, 84], t: 33, instr: "Precision Alignment" }
            };
            const activeSet = sets[type];
            routineQueue = activeSet.q;
            target = activeSet.t;
            openCounter(routineQueue[0], true);
            document.getElementById('counter-meaning').innerText = activeSet.instr;
            switchTab('counter');
        }

        function nextRoutineStep() {
            routineIndex++;
            if (routineIndex < routineQueue.length) {
                openCounter(routineQueue[routineIndex], true);
            } else {
                isRoutineActive = false;
                document.getElementById('routine-progress').classList.add('hidden');
                document.getElementById('reflect-btn').classList.remove('hidden');
                document.getElementById('target-btn').innerHTML = "Set Complete";
            }
        }

        function startWeavedDua() {
            isRoutineActive = false;
            const res = namesData.filter(n => Array.from(activeTags).some(t => n.tags.includes(t)));
            const situationSet = res.filter(n => n.id !== 1 && n.id !== 2).slice(0, 4);
            const midNames = situationSet.map(n => "Ya " + clean(n.transliteration)).join(', ');
            
            const shortRecitation = `Ya Rahman Ya Rahim, ${midNames}, Ya Wakil`;
            
            currentNameData = { id: 99, arabic: "◌", transliteration: "Weaved Dua", meaning: "Combined Focus" };
            target = 33;
            resetCounter();
            
            document.getElementById('counter-arabic').innerText = "◌";
            document.getElementById('counter-transliteration').innerText = shortRecitation;
            document.getElementById('counter-meaning').innerText = "Personalized Formula";
            document.getElementById('counter-template').innerHTML = activeWeavedFormula;
            document.getElementById('target-count-display').innerText = "Focus: Surrender Outcomes";
            document.getElementById('routine-progress').classList.add('hidden');
            switchTab('counter');
        }

        function openCounter(id, fromRoutine = false) {
            currentNameData = namesData.find(n => n.id === id) || namesData[0];
            
            document.getElementById('counter-arabic').innerText = currentNameData.arabic;
            document.getElementById('counter-transliteration').innerText = "Ya " + clean(currentNameData.transliteration);
            document.getElementById('counter-meaning').innerText = currentNameData.meaning;
            document.getElementById('target-btn-text').innerText = target;
            document.getElementById('target-count-display').innerText = 'Target: ' + target;
            
            const yaName = "Ya " + clean(currentNameData.transliteration);
            document.getElementById('counter-template').innerText = `"${yaName}, manage my affairs in the best way for me."`;

            resetCounter();
            
            const rp = document.getElementById('routine-progress');
            if(fromRoutine) {
                rp.classList.remove('hidden');
                document.getElementById('routine-step').innerText = `${routineIndex + 1}/${routineQueue.length}`;
            } else rp.classList.add('hidden');
            
            document.getElementById('reflect-btn').classList.add('hidden');
        }

        // --- Interaction ---
        function incrementCounter() {
            count++;
            totalLifetimeDhikr++;
            localStorage.setItem('lifetime_dhikr', totalLifetimeDhikr);
            if (navigator.vibrate) count === target ? navigator.vibrate([200, 100, 200]) : navigator.vibrate(15);
            updateUI();
            const el = document.getElementById('current-count'); if (el) { el.style.transform = 'scale(0.9)'; setTimeout(() => el.style.transform = 'scale(1)', 100); }
        }

        function updateUI() {
            document.getElementById('current-count').innerText = count;
            document.getElementById('progress-bar').style.width = `${Math.min(count / target, 1) * 100}%`;
            
            const tb = document.getElementById('target-btn');
            const rb = document.getElementById('reflect-btn');

            if (count >= target) {
                if (isRoutineActive) {
                    tb.innerHTML = (routineIndex < routineQueue.length - 1) ? "Next Name" : "Finish Set";
                    tb.onclick = (e) => { e.stopPropagation(); nextRoutineStep(); };
                } else {
                    rb.classList.remove('hidden');
                    tb.innerHTML = "Goal Met • Keep Going";
                    tb.onclick = (e) => { e.stopPropagation(); openTargetModal(); };
                }
            } else {
                tb.innerHTML = `Target: <span id='target-btn-text'>${target}</span>`;
                tb.onclick = (e) => { e.stopPropagation(); openTargetModal(); };
            }
        }

        // --- General Utils ---
        function switchTab(tab, push = true) {
            if (tab === currentTab) return;
            if (push) historyStack.push(currentTab);
            currentTab = tab;
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            ['home', 'library', 'journal', 'counter', 'router'].forEach(t => {
                const b = document.getElementById(`tab-btn-${t}`);
                if(b) b.classList.remove('text-emerald-400');
            });
            const v = document.getElementById(`view-${tab}`); if(v) v.classList.add('active');
            const b = document.getElementById(`tab-btn-${tab}`); if(b) b.classList.add('text-emerald-400');
            document.getElementById('bottom-nav').classList.toggle('hidden', tab === 'counter');
            document.getElementById('main-header').classList.toggle('hidden', tab === 'counter');
            const bb = document.getElementById('global-back-btn');
            if(bb) { bb.classList.toggle('hidden', historyStack.length <= 1); bb.style.bottom = tab === 'counter' ? '20px' : '90px'; }
            if (tab === 'home') updateStatsDisplay();
            if (tab === 'journal') renderJournal();
            if (tab === 'router') filterNames('router');
        }
        function goBack() { if (historyStack.length > 1) switchTab(historyStack.pop(), false); }
        function resetCounter() { count = 0; updateUI(); }
        function toggleStatsVisibility() { isStatsHidden = !isStatsHidden; localStorage.setItem('stats_hidden', isStatsHidden); updateStatsDisplay(); }
        function updateStatsDisplay() { const s = document.getElementById('lifetime-stats'); if (s) s.innerText = isStatsHidden ? '••••' : totalLifetimeDhikr.toLocaleString(); }
        function confirmResetStats() { totalLifetimeDhikr = 0; localStorage.setItem('lifetime_dhikr', '0'); updateStatsDisplay(); closeConfirmModal(); }
        function closeConfirmModal() { const m = document.getElementById('confirm-reset-modal'); if(m) { m.classList.remove('opacity-100'); setTimeout(() => { m.classList.remove('flex'); m.classList.add('hidden'); }, 300); } }
        function handleSearch(e) { searchQuery = e.target.value.toLowerCase(); filterNames('library'); }
        function clearFilters() { activeTags.clear(); document.querySelectorAll('#view-router button[id^="tag-"]').forEach(b => b.classList.remove('border-emerald-500')); filterNames('router'); }
        function openTargetModal() { document.getElementById('target-modal').classList.remove('hidden'); document.getElementById('target-modal').classList.add('flex'); void document.getElementById('target-modal').offsetWidth; document.getElementById('target-modal').classList.add('opacity-100'); }
        function closeTargetModal() { document.getElementById('target-modal').classList.remove('opacity-100'); setTimeout(() => { document.getElementById('target-modal').classList.add('hidden'); }, 300); }
        function quickSetTarget(v) { document.getElementById('custom-target-input').value = v; }
        function saveCustomTarget() { target = parseInt(document.getElementById('custom-target-input').value) || 33; updateUI(); closeTargetModal(); }
        function updateDayTrack() { const day = new Date().getDate(); document.getElementById('track-day-label').innerText = `Day ${day} Mastery`; }
        function startDayTrack() { isRoutineActive = false; target = 100; openCounter(namesData[(new Date().getDate() - 1) % namesData.length].id); switchTab('counter'); }

        function openJournal() { 
            const jp = document.getElementById('journal-prompt'); if(jp && currentNameData) jp.innerText = `What clarity did you find during this session?`; 
            const mw = document.getElementById('journal-write-modal'); if(mw) { mw.classList.remove('hidden'); mw.classList.add('flex'); void mw.offsetWidth; mw.classList.add('opacity-100'); const ji = document.getElementById('journal-input'); if(ji) ji.focus(); }
        }
        function closeJournalModal() { const modal = document.getElementById('journal-write-modal'); if(modal) { modal.classList.remove('opacity-100'); setTimeout(() => { modal.classList.remove('flex'); modal.classList.add('hidden'); }, 300); } }
        function saveJournalEntry() {
            const txt = document.getElementById('journal-input').value;
            if (txt) {
                journalEntries.unshift({ date: new Date().toLocaleDateString(), name: currentNameData.transliteration, text: txt });
                localStorage.setItem('journal_entries', JSON.stringify(journalEntries));
            }
            closeJournalModal(); renderJournal(); switchTab('journal');
        }
        function renderJournal() {
            const list = document.getElementById('journal-entries-list');
            if(list) list.innerHTML = journalEntries.map(e => `<div class="bg-slate-800 border border-slate-700/50 p-6 rounded-3xl mb-4 shadow-sm"><div><span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">${e.date}</span><h4 class="font-bold text-white mt-1 text-lg leading-tight">${e.name}</h4><p class="text-slate-400 text-sm mt-3 leading-relaxed">${e.text}</p></div></div>`).join('');
        }

        function toggleBreathingMode() {
            breathingMode = !breathingMode;
            const b = document.getElementById('breathing-toggle-btn');
            if(b) { b.innerText = breathingMode ? "Pacer: On" : "Pacer: Off"; b.classList.toggle('text-emerald-400', breathingMode); }
            document.getElementById('view-counter').classList.toggle('breathing-active', breathingMode);
            document.getElementById('breathing-line-container').classList.toggle('hidden', !breathingMode);
            if (breathingMode) startBreathing(); else stopBreathing();
        }
        function startBreathing() {
            const line = document.getElementById('breathing-line'); if (!line) return;
            const loop = () => { line.style.transition = 'width 4s linear'; line.style.width = '100%'; setTimeout(() => { if(!line) return; line.style.transition = 'none'; setTimeout(() => { if(!line) return; line.style.transition = 'width 6s linear'; line.style.width = '0%'; }, 2000); }, 4000); };
            loop(); breathingTimer = setInterval(loop, 12000);
        }
        function stopBreathing() { clearInterval(breathingTimer); breathingMode = false; }
        
        function toggleExpand(id, b) { const el = document.getElementById(id); if(el) { el.classList.toggle('tag-collapsed'); b.innerText = el.classList.contains('tag-collapsed') ? "Show All" : "Collapse"; } }
        function setupGlobalEvents() {
            document.getElementById('btn-reset-stats').onclick = () => { document.getElementById('confirm-reset-modal').classList.remove('hidden'); document.getElementById('confirm-reset-modal').classList.add('flex'); void document.getElementById('confirm-reset-modal').offsetWidth; document.getElementById('confirm-reset-modal').classList.add('opacity-100'); };
            document.getElementById('btn-reset').onclick = resetCounter;
        }
        function handleMainTap(e) { if (e.target.closest('button')) return; incrementCounter(); }

        window.onload = initApp;
    </script>
</body>
</html>
