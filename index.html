            { id: 14, arabic: "ٱلْغَفَّارُ", transliteration: "Al-Ghaffar", meaning: "The Repeatedly Forgiving", tags: ["forgiveness", "repentance", "guilt"] },
            { id: 18, arabic: "ٱلْفَتَّاحُ", transliteration: "Al-Fattah", meaning: "The Opener", tags: ["opportunity", "exams", "job search", "obstacles"] },
            { id: 19, arabic: "ٱلْعَلِيمُ", transliteration: "Al-‘Alim", meaning: "The All-Knowing", tags: ["knowledge", "learning", "study", "wisdom"] },
            { id: 30, arabic: "ٱللَّطِيفُ", transliteration: "Al-Latif", meaning: "The Subtle One", tags: ["anxiety", "ease", "calmness", "unseen help"] },
            { id: 32, arabic: "ٱلْحَلِيمُ", transliteration: "Al-Halim", meaning: "The Forbearing", tags: ["anger", "patience", "frustration"] },
            { id: 38, arabic: "ٱلْحَافِظُ", transliteration: "Al-Hafiz", meaning: "The Preserver", tags: ["protection", "safety", "travel"] },
            { id: 46, arabic: "ٱلْحَكِيمُ", transliteration: "Al-Hakim", meaning: "The Wise", tags: ["wisdom", "decisions", "strategy", "clarity"] },
            { id: 47, arabic: "ٱلْوَدُودُ", transliteration: "Al-Wadud", meaning: "The Loving", tags: ["love", "marriage", "family", "harmony"] },
            { id: 62, arabic: "ٱلْحَيُّ", transliteration: "Al-Hayy", meaning: "The Ever-Living", tags: ["fatigue", "energy", "vitality", "burnout"] },
            { id: 63, arabic: "ٱلْقَيُّومُ", transliteration: "Al-Qayyum", meaning: "The Sustainer", tags: ["stability", "support", "balance", "endurance"] },
            { id: 84, arabic: "ٱلْوَكِيلُ", transliteration: "Al-Wakil", meaning: "The Trustee", tags: ["reliance", "trust", "surrender", "control"] }
        ];

        const routineLibrary = { morning: [0, 1, 2, 5, 18, 19, 62], evening: [0, 14, 30, 32, 38, 46, 63], crisis: [5, 30, 84] };

        // --- Core Functions ---
        function switchTab(tab, push = true) {
            if (tab === currentTab) return;
            if (push) historyStack.push(currentTab);
            currentTab = tab;
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            ['home', 'library', 'journal', 'counter', 'router'].forEach(t => document.getElementById(`tab-btn-${t}`)?.classList.remove('text-emerald-400'));
            
            const view = document.getElementById(`view-${tab}`); if(view) view.classList.add('active');
            const btn = document.getElementById(`tab-btn-${tab}`); if(btn) btn.classList.add('text-emerald-400');
            
            document.getElementById('bottom-nav').classList.toggle('hidden', tab === 'counter');
            document.getElementById('main-header').classList.toggle('hidden', tab === 'counter');
            
            const backBtn = document.getElementById('global-back-btn');
            if(backBtn) { backBtn.classList.toggle('hidden', historyStack.length <= 1); backBtn.style.bottom = tab === 'counter' ? '20px' : '90px'; }
            if (tab !== 'counter') stopBreathing();
            if (tab === 'home') updateStatsDisplay();
            if (tab === 'journal') renderJournal();
            if (tab === 'router') filterNames('router');
        }

        function goBack() { if (historyStack.length > 1) switchTab(historyStack.pop(), false); }

        function initApp() {
            currentNameData = namesData[0];
            renderTags('feelings-box', ["anxiety", "sadness", "anger", "fear", "fatigue", "overwhelmed", "confusion"]);
            renderTags('situations-box', ["exams", "job search", "leadership", "marriage", "family", "conflict", "hardship"]);
            renderTags('intentions-box', ["peace", "wisdom", "healing", "protection", "provision", "clarity", "resilience"]);
            filterNames('library'); filterNames('router'); updateDayTrack(); updateStatsDisplay(); setupSafetyButtons();
        }

        function renderTags(id, items) { 
            const container = document.getElementById(id); if (!container) return;
            container.innerHTML = items.map(t => `<button onclick="toggleTag('${t}')" id="tag-${t}" class="px-3 py-1.5 rounded-lg text-[10px] font-black border border-slate-700 bg-slate-800 text-slate-400 transition-all m-1 uppercase tracking-tighter whitespace-nowrap">${t}</button>`).join(''); 
        }

        function toggleTag(t) { 
            activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t); 
            const el = document.getElementById(`tag-${t}`); if(el) el.classList.toggle('border-emerald-500'); filterNames('router'); 
        }

        function filterNames(ctx) {
            const list = document.getElementById(ctx + '-list'); if(!list) return;
            const res = namesData.filter(n => ctx === 'library' ? (!searchQuery || n.transliteration.toLowerCase().includes(searchQuery)) : (activeTags.size === 0 || Array.from(activeTags).some(t => n.tags.includes(t))));
            
            if (ctx === 'router' && activeTags.size > 0) {
                const banner = document.getElementById('combination-banner'); if(banner) banner.classList.remove('hidden');
                const mid = res.slice(0, 3).map(n => n.transliteration);
                const duaText = document.getElementById('combined-dua-text');
                if(duaText) duaText.innerHTML = `Ya Rahman Ya Rahim, <span class='text-indigo-400'>Ya ${mid.join(', Ya ')}</span>, Ya Wakil, I place my trust in You.`;
            } else if (ctx === 'router') document.getElementById('combination-banner')?.classList.add('hidden');
            
            list.innerHTML = res.map(n => `<div onclick="openCounter(${n.id}); switchTab('counter')" class="bg-slate-800 border border-slate-700/50 p-6 rounded-[2rem] flex justify-between items-center active:scale-95 transition-all mb-3 shadow-sm"><div><h3 class="font-black text-white text-lg">${n.transliteration}</h3><p class="text-[10px] text-slate-500 uppercase">${n.meaning}</p></div><span class="text-3xl font-serif text-emerald-500">${n.arabic}</span></div>`).join('');
        }

        function startWeavedDua() { openCounter(0, false, 33); switchTab('counter'); }

        function updateDayTrack() {
            const day = new Date().getDate(), name = namesData[(day - 1) % namesData.length];
            const tl = document.getElementById('track-day-label'), nt = document.getElementById('track-name-trans'), nm = document.getElementById('track-name-meaning'), dots = document.getElementById('track-progress-dots');
            if(tl) tl.innerText = `Day ${day}`; if(nt) nt.innerText = name.transliteration; if(nm) nm.innerText = name.meaning;
            if(dots) dots.innerHTML = Array(5).fill(0).map((_, i) => `<div class='w-1.5 h-1.5 rounded-full ${i < (day % 5) ? 'bg-indigo-400' : 'bg-slate-700'}'></div>`).join('');
        }

        function startDayTrack() { openCounter(namesData[(new Date().getDate() - 1) % namesData.length].id, false, 100); switchTab('counter'); }

        function openCounter(id, fromRoutine = false, customTarget = 33) {
            currentNameData = namesData.find(n => n.id === id) || namesData[0];
            target = customTarget;
            document.getElementById('counter-arabic').innerText = currentNameData.arabic;
            document.getElementById('counter-transliteration').innerText = currentNameData.transliteration;
            document.getElementById('counter-meaning').innerText = currentNameData.meaning;
            document.getElementById('target-btn-text').innerText = target;
            document.getElementById('target-count-display').innerText = 'Target: ' + target;
            resetCounter(); setDhikrTarget('self');
        }

        function toggleBreathingMode() {
            breathingMode = !breathingMode;
            const b = document.getElementById('breathing-toggle-btn');
            if(b) { b.innerText = breathingMode ? 'Pacer On' : 'Pacer Off'; b.classList.toggle('text-emerald-400', breathingMode); }
            document.getElementById('view-counter').classList.toggle('breathing-active', breathingMode);
            document.getElementById('breathing-line-container').classList.toggle('hidden', !breathingMode);
            if (breathingMode) startBreathing(); else stopBreathing();
        }

        function startBreathing() {
            const line = document.getElementById('breathing-line'); if (!line) return;
            const loop = () => { line.style.transition = 'width 4s linear'; line.style.width = '100%'; setTimeout(() => { if(!line) return; line.style.transition = 'none'; setTimeout(() => { if(!line) return; line.style.transition = 'width 6s linear'; line.style.width = '0%'; }, 2000); }, 4000); };
            loop(); breathingTimer = setInterval(loop, 12000);
        }

        function stopBreathing() { clearInterval(breathingTimer); breathingMode = false; }

        function incrementCounter() {
            count++; totalLifetimeDhikr++; localStorage.setItem('lifetime_dhikr', totalLifetimeDhikr);
            if (navigator.vibrate) count === target ? navigator.vibrate([200, 100, 200]) : navigator.vibrate(15);
            playTick(count === target); updateUI();
            const el = document.getElementById('current-count'); if (el) { el.style.transform = 'scale(0.9)'; setTimeout(() => el.style.transform = 'scale(1)', 100); }
        }

        function resetCounter() { count = 0; updateUI(); }
        function updateUI() {
            const cc = document.getElementById('current-count'), pb = document.getElementById('progress-bar'), tb = document.getElementById('target-btn');
            if(cc) cc.innerText = count; if(pb) pb.style.width = `${Math.min(count / target, 1) * 100}%`;
            if(tb) { if (count >= target) tb.innerHTML = 'Write Reflection'; else tb.innerHTML = `Target: <span id='target-btn-text'>${target}</span>`; }
        }

        function setupSafetyButtons() {
            const btns = [ { id: 'btn-reset', act: resetCounter }, { id: 'target-btn', act: () => count >= target ? openJournal() : openTargetModal() }, { id: 'btn-reset-stats', act: () => { const m = document.getElementById('confirm-reset-modal'); m.classList.remove('hidden'); m.classList.add('flex'); void m.offsetWidth; m.classList.add('opacity-100'); } } ];
            btns.forEach(c => {
                const el = document.getElementById(c.id); if (!el) return;
                let timer, fired = false;
                const start = () => { fired = false; if (count === 0 || count >= target || c.id==='btn-reset-stats') { if(c.id==='btn-reset-stats'){timer=setTimeout(()=> {fired=true; c.act();},1000); el.style.opacity='0.5';} else {fired=true; c.act();} return; }
                    el.style.opacity = '0.5'; timer = setTimeout(() => { fired = true; c.act(); el.style.opacity = '1'; }, 1000); };
                const end = () => { clearTimeout(timer); el.style.opacity = '1'; if (!fired && (count > 0 || c.id==='btn-reset-stats')) { const old = el.innerHTML; el.innerHTML = `<span class="text-[10px]">HOLD</span>`; setTimeout(() => el.innerHTML = old, 800); } };
                el.onmousedown = start; el.onmouseup = end; el.ontouchstart = start; el.ontouchend = end;
            });
        }

        function startRoutine(type) { openCounter(routineLibrary[type][0], true); switchTab('counter'); }
        function toggleStatsVisibility() { isStatsHidden = !isStatsHidden; localStorage.setItem('stats_hidden', isStatsHidden); updateStatsDisplay(); }
        function updateStatsDisplay() { const s = document.getElementById('lifetime-stats'); const eye = document.getElementById('eye-icon'); if (s) s.innerText = isStatsHidden ? '••••' : totalLifetimeDhikr.toLocaleString(); }
        function confirmResetStats() { totalLifetimeDhikr = 0; localStorage.setItem('lifetime_dhikr', '0'); updateStatsDisplay(); closeConfirmModal(); if (navigator.vibrate) navigator.vibrate([100, 50, 100]); }
        function closeConfirmModal() { const m = document.getElementById('confirm-reset-modal'); if(m) { m.classList.remove('opacity-100'); setTimeout(() => { m.classList.remove('flex'); m.classList.add('hidden'); }, 300); } }
        function handleSearch(e) { searchQuery = e.target.value.toLowerCase(); filterNames('library'); }
        function clearFilters() { activeTags.clear(); document.querySelectorAll('#view-router button[id^="tag-"]').forEach(b => b.classList.remove('border-emerald-500')); filterNames('router'); }
        function openTargetModal() { document.getElementById('target-modal').classList.remove('hidden'); document.getElementById('target-modal').classList.add('flex'); void document.getElementById('target-modal').offsetWidth; document.getElementById('target-modal').classList.add('opacity-100'); }
        function closeTargetModal() { document.getElementById('target-modal').classList.remove('opacity-100'); setTimeout(() => document.getElementById('target-modal').classList.add('hidden'), 300); }
        function quickSetTarget(v) { document.getElementById('custom-target-input').value = v; }
        function saveCustomTarget() { const input = document.getElementById('custom-target-input'); if(input) { target = parseInt(input.value) || 33; updateUI(); closeTargetModal(); } }
        function openJournal() { 
            const jp = document.getElementById('journal-prompt'); if(jp && currentNameData) jp.innerText = `How did reflecting on ${currentNameData.transliteration} feel?`; 
            const mw = document.getElementById('journal-write-modal'); if(mw) { mw.classList.remove('hidden'); mw.classList.add('flex'); void mw.offsetWidth; mw.classList.add('opacity-100'); const ji = document.getElementById('journal-input'); if(ji) ji.focus(); }
        }
        function closeJournalModal() { const modal = document.getElementById('journal-write-modal'); if(modal) { modal.classList.remove('opacity-100'); setTimeout(() => { modal.classList.remove('flex'); modal.classList.add('hidden'); }, 300); } }
        function saveJournalEntry() { const t = document.getElementById('journal-input')?.value; if(t) { journalEntries.unshift({date: new Date().toLocaleDateString(), name: currentNameData.transliteration, text: t}); localStorage.setItem('journal_entries', JSON.stringify(journalEntries)); renderJournal(); } closeJournalModal(); resetCounter(); switchTab('journal'); }
        function renderJournal() { const list = document.getElementById('journal-entries-list'); if(list) list.innerHTML = journalEntries.map(e => `<div class="bg-slate-800 border border-slate-700/50 p-6 rounded-3xl mb-4 shadow-sm"><div><span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">${e.date}</span><h4 class="font-bold text-white mt-1 text-lg">${e.name}</h4><p class="text-slate-400 text-sm mt-3 leading-relaxed">${e.text}</p></div></div>`).join(''); }
        function toggleSound() { soundEnabled = !soundEnabled; if(soundEnabled) initAudio(); document.getElementById('sound-btn')?.classList.toggle('text-emerald-400', soundEnabled); }
        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playTick(s) { if(!soundEnabled || !audioCtx) return; const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = s ? 'triangle' : 'sine'; o.frequency.setValueAtTime(s ? 880 : 440, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1); o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1); }
        function toggleExpand(id, b) { const el = document.getElementById(id); if(el) { el.classList.toggle('tag-collapsed'); b.innerText = el.classList.contains('tag-collapsed') ? "Expand" : "Collapse"; } }
        function setDhikrTarget(t) { currentDhikrTarget = t; ['self','family','him','her'].forEach(p => { const el = document.getElementById(`target-pill-${p}`); if(el) el.className = `px-5 py-2 rounded-2xl text-[10px] font-black uppercase tracking-widest ${p===t ? 'bg-emerald-600 text-white shadow-xl' : 'bg-slate-800 border border-slate-700 text-slate-500'}`; }); generateTemplate(currentNameData, t); }
        function generateTemplate(n, t) { if(!n) return; const ya = "Ya " + n.transliteration.replace(/^(Al-|Ar-|As-|An-|Ad-|At-|Az-|Ash-|Ak-|Aq-|Ah-|Am-)/i, ''); const temp = document.getElementById('counter-template'); if(temp) temp.innerText = `"${ya}, bless ${t==='self'?'me':t==='family'?'my family':t} with mercy today."`; }
        function handleMainTap(e) { if (e.target.closest('button') || e.target.closest('.no-tap')) return; incrementCounter(); }

        window.onload = initApp;
    </script>
</body>
</html>
